    <style>
        /* اترك التصميم الحالي كما هو
  - أنيق جدا */
        /* يمكن إضافة التحسينات أدناه */

        .secure-badge {
            background: rgba(0,184,148,0.1);
            border: 1px solid rgba(0,184,148,0.2);
            color: var(--success);
            padding: 8px 12px;

            font-size: 12px;

        }
    </style>

<body>
    <div class="payment-card">
        <div class="header">
            <div class="logo-placeholder">π</div>
            <h1>بوابة دفع NEXCORE</h1>
            <p>حلول الدفع الرقمية الآمنة لـ Pi Network</p>
        </div>

        <div class="content">
            <!-- قسم تسجيل الدخول -->
            <div id="loginSection">
                <div class="status-box" id="statusBox">
                    <span class="status-dot"></span>
                    <span id="statusText">جاري تحميل Pi SDK...</span>
                </div>
                <button id="loginBtn" class="btn-primary" onclick="login()" disabled>
                    <div class="spinner" id="loginSpinner"></div>
                    <span id="loginBtnText">تسجيل الدخول عبر Pi</span>
                </button>
                <div class="secure-badge">🔒 اتصال مشفر وآمن</div>
            </div>

            <!-- قسم الدفع -->
            <div id="paySection" class="hidden">
                <div class="user-welcome">
                    مرحباً <b id="username"></b> 👋
                </div>

                <div class="input-group">
                    <label>المبلغ (π)</label>
                    <input type="number" id="amount" value="1" step="0.01" min="0.01">
                </div>

                <div class="input-group">
                    <label>الوصف / البيان</label>
                    <input type="text" id="memo" value="دفعة عبر بوابة Nexcore">
                </div>

                <button class="btn-secondary" onclick="pay()">
                    ⚡ إرسال الدفعة
                </button>
                <button onclick="logout()" style="background:rgba(255,255,255,0.08); color:var(--text-muted); font-size:14px; padding:12px; border:1px solid rgba(255,255,255,0.05);">
                    ↩ تسجيل خروج
                </button>

                <!-- ربط بالمخزون -->
                <a href="/dashboard.html" style="display:block; text-align:center; margin-top:15px; color:var(--primary); font-size:14px; text-decoration:none; padding:10px; border:1px solid rgba(108,92,231,0.3); border-radius:12px;">
                    🏪 الذهاب إلى لوحة المخزون
                </a>
            </div>

            <div class="log" id="log">انتظر تحميل البيئة...</div>
        </div>
    </div>

    <script>
        // ========== إعدادات الأمان ==========
        const API_BASE_URL = 'https://your-backend-url.com/api'; // ❗ غيّر هذا لاحقاً
        let piReady = false;
        let currentUser = null;

        const logEl = document.getElementById('log');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginBtnText = document.getElementById('loginBtnText');
        const statusText = document.getElementById('statusText');

        function setLog(msg, type = '') {
            logEl.innerText = msg;
            logEl.className = 'log ' + type;
        }
// ========== التحقق من Pi SDK مع مهلة زمنية ==========
        let sdkTimeout = setTimeout(() => {
            if (!window.Pi) {
                setLog("⚠️ لم يتم تحميل Pi SDK. تأكد من فتح الصفحة في تطبيق Pi Browser", "error");
                loginBtn.disabled = true;
                statusText.innerText = "خطأ في التحميل";
            }
        }, 8000);

        const wait = setInterval(() => {
            if (window.Pi) {
                Pi.init({ version: "2.0", sandbox: true });
                piReady = true;
                clearInterval(wait);
                clearTimeout(sdkTimeout);
                loginBtn.disabled = false;
                statusText.innerText = "✅ جاهز — اضغط تسجيل الدخول";
                setLog("✅ جاهز للربط — اضغط الزر أدناه");
            }
        }, 200);

        // ========== تسجيل الدخول مع تخزين آمن ==========
        async function login() {
            if (!piReady) return setLog("افتح التطبيق داخل Pi Browser", "error");

            loginBtn.disabled = true;
            loginSpinner.style.display = "block";
            loginBtnText.innerText = "جاري الاتصال...";

            try {
                const auth = await Pi.authenticate(
                    ["username", "payments"],
                    (p) => console.log("incomplete payment", p)
                );

                currentUser = auth.user;
                
                // تخزين الجلسة بشكل آمن
                sessionStorage.setItem('pi_session', JSON.stringify({
                    username: auth.user.username,
                    uid: auth.user.uid,
                    timestamp: Date.now()
                }));

                document.getElementById('username').innerText = "@" + auth.user.username;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('paySection').classList.remove('hidden');
                document.getElementById('statusBox').classList.add('connected');
                setLog("✅ تم تسجيل الدخول بنجاح", "success");

                // تسجيل الدخول في الخادم
                try {
                    await fetch(setLog("⏳ جاري موافقة الخادم...");
                        try {
                            const response = await fetch(${API_BASE_URL}/payments/approve, {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': Bearer ${currentUser?.uid} // أمان
                                },
                                body: JSON.stringify({ 
                                    paymentId, 
                                    amount,
                                    userId: currentUser?.uid 
                                })
                            });

                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.error || 'فشلت موافقة الخادم');
                            }

                            setLog("✅ تمت موافقة الخادم", "success");
                        } catch (err) {
                            setLog("❌ فشل الموافقة: " + err.message, "error");
                        }
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        setLog("⏳ جاري توثيق الدفعة وتحديث المخزون...");
                        try {
                            const response = await fetch(${API_BASE_URL}/payments/complete, {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': Bearer ${currentUser?.uid}
                                },
                                body: JSON.stringify({ 
                                    paymentId, 
                                    txid,
                                    userId: currentUser?.uid,
                                    amount // تسجيل المبلغ للتدقيق
                                })
                            });

                            if (!response.ok) {
                                const errorData = await response.json();
                                throw new Error(errorData.error || 'فشل التوثيق');
                            }

                            // تحديث واجهة المستخدم بعد الدفع الناجح
                            const data = await response.json();
                            setLog(✅ تمت الدفعة بنجاح! المبلغ: ${amount} π, "success");
                            
                            // يمكن إضافة تأثير احتفالي
                            showSuccessAnimation();

                        } catch (err) {
                            setLog("❌ فشل الإكمال: " + err.message, "error");
                        }
                    },
                    onCancel: () => setLog("تم إلغاء الدفعة من قبل المستخدم"),
                    onError: (err) => setLog("❌ خطأ في المعاملة: " + err.message, "error")
                }
            );
        }

        // ========== تأثير النجاح ==========
        function showSuccessAnimation() {
            const logBox = document.getElementById('log');
            logBox.innerHTML = '✅✅✅ تمت الدفعة بنجاح ✅✅✅';
            logBox.style.background = 'rgba(0,184,148,0.2)';
            logBox.style.border = '2px solid var(--success)';
            logBox.style.fontSize = '18px';
            logBox.style.padding = '20px';
            
            setTimeout(() => {
                logBox.style.background = '';
                logBox.style.border = '';
                logBox.style.fontSize = '';
                logBox.style.padding = '';
            }, 5000);
        }

        // ========== تسجيل الخروج ==========function logout() {
            currentUser = null;
            sessionStorage.removeItem('pi_session');
            
            document.getElementById('paySection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('statusBox').classList.remove('connected');
            loginBtn.disabled = false;
            setLog("✅ تم تسجيل الخروج — اضغط للدخول مرة أخرى");
        }

        // ========== التحقق من الجلسة عند التحميل ==========
        document.addEventListener('DOMContentLoaded', () => {
            const savedSession = sessionStorage.getItem('pi_session');
            if (savedSession) {
                try {
                    const session = JSON.parse(savedSession);
                    // التحقق من صلاحية الجلسة (أقل من ساعة)
                    if (Date.now()

    }
});
