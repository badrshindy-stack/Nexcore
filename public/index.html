<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexcore — بوابة الدفع الآمنة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root {
      --primary: #6a11cb;
      --primary-dark: #4a0b8a;
      --secondary: #2575fc;
      --success: #00b894;
      --error: #e17055;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.6);
      --card-bg: rgba(255,255,255,0.1);
      --card-border: rgba(255,255,255,0.15);
      --input-bg: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; color: var(--text);
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 400px; width: 100%;
      box-shadow: var(--shadow);
      border: 1px solid var(--card-border);
    }
    .logo {
      width: 80px; height: 80px; margin: 0 auto 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 800;
    }
    h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
    .subtitle {
      text-align: center; opacity: 0.8; margin-bottom: 24px;
      font-size: 14px; color: var(--text-muted);
    }
    /* Status Box */
    .status-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 12px 16px; border-radius: 14px;
      margin-bottom: 16px; font-size: 14px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fdcb6e; flex-shrink: 0;
      transition: background 0.4s;
    }
    .status-box.connected .status-dot { background: var(--success); }
    /* Buttons */
    button {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: 'Tajawal', Arial, sans-serif;
      transition: all 0.2s; margin-top: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: #fff; color: var(--primary);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .btn-secondary {
      background: linear-gradient(135deg, var(--success), #00cec9);
      color: #fff;
    }
    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,184,148,0.3);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.15); }
    /* Inputs */
    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block; font-size: 14px; margin-bottom: 6px;
      color: var(--text-muted);
    }
    .input-group input {
      width: 100%; padding: 12px 16px; border: none; border-radius: 12px;
      font-size: 16px; font-family: 'Tajawal', Arial, sans-serif;
      background: var(--input-bg); color: #fff;
      outline: 1px solid rgba(255,255,255,0.1);
      transition: outline 0.2s;
    }
    .input-group input:focus { outline: 2px solid rgba(255,255,255,0.4); }
    .input-group input::placeholder { color: rgba(255,255,255,0.4); }
    /* User Welcome */
    .user-box {
      background: rgba(255,255,255,0.12);
      padding: 14px; border-radius: 14px; margin-bottom: 18px;
      text-align: center; font-size: 15px;
    }
    /* Log */
    .log {
      margin-top: 16px; padding: 14px;
      background: rgba(0,0,0,0.2); border-radius: 14px;
      font-size: 13px; min-height: 44px; text-align: center;
      transition: all 0.3s;
      word-break: break-word;
    }
    .log.success { background: rgba(0,184,148,0.2); border: 1px solid var(--success); }
    .log.error { background: rgba(225,112,85,0.2); border: 1px solid var(--error); }
    /* Secure Badge */
    .secure-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(0,184,148,0.08);
      border: 1px solid rgba(0,184,148,0.15);
      color: var(--success); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-top: 12px;
    }
    /* Dashboard Link */
    .dashboard-link {
      display: block; text-align: center; margin-top: 14px;
      color: var(--primary); font-size: 14px; text-decoration: none;
      padding: 10px; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; transition: background 0.2s;
    }
    .dashboard-link:hover { background: rgba(255,255,255,0.08); }
    /* Spinner */
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid var(--primary); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Hidden */
    .hidden { display: none !important; }
    /* Success Animation */
    .success-flash {
      animation: flashGlow 0.6s ease;
    }
    @keyframes flashGlow {
      0% { box-shadow: 0 0 0 0 rgba(0,184,148,0.5); }
      100% { box-shadow: 0 0 40px 10px rgba(0,184,148,0); }
    }
  </style>
</head>
<body>
  <div class="card" id="appCard">
    <div class="logo">π</div>
    <h1>Nexcore</h1>
    <p class="subtitle">بوابة دفع Pi Network — آمنة ومشفرة</p>

    <!-- ====== قسم تسجيل الدخول ====== -->
    <div id="loginSection">
      <div class="status-box" id="statusBox">
        <span class="status-dot"></span>
        <span id="statusText">جاري تحميل Pi SDK...</span>
      </div>
      <button id="loginBtn" class="btn-primary" onclick="login()" disabled>
        <span class="spinner" id="loginSpinner"></span>
        <span id="loginBtnText">تسجيل الدخول عبر Pi</span>
      </button>
      <div class="secure-badge">🔒 اتصال مشفر وآمن</div>
    </div>

    <!-- ====== قسم الدفع ====== -->
    <div id="paySection" class="hidden">
      <div class="user-box">
        👋 مرحباً <b id="username"></b>
      </div>
      <div class="input-group">
        <label>المبلغ (π)</label>
        <input type="number" id="amount" value="1" step="0.01" min="0.01">
      </div>
      <div class="input-group">
        <label>الوصف / البيان</label>
        <input type="text" id="memo" value="دفعة عبر بوابة Nexcore">
      </div>
      <button class="btn-secondary" onclick="pay()">⚡ إرسال الدفعة</button>
      <button class="btn-ghost" onclick="logout()">↩ تسجيل خروج</button>
      <a href="/dashboard.html" class="dashboard-link">🏪 الذهاب إلى لوحة المخزون</a>
    </div>

    <div class="log" id="log">⏳ انتظر تحميل البيئة...</div>
  </div>

  <script>
    // ========== الإعدادات ==========
    const API_BASE_URL = 'https://your-backend-url.com/api'; // ⚠️ غيّر هذا لاحقاً

    let piReady = false;
    let currentUser = null;

    const logEl = document.getElementById('log');
    const loginBtn = document.getElementById('loginBtn');
    const loginSpinner = document.getElementById('loginSpinner');
    const loginBtnText = document.getElementById('loginBtnText');
    const statusText = document.getElementById('statusText');
    const statusBox = document.getElementById('statusBox');

    function setLog(msg, type) {
      logEl.innerText = msg;
      logEl.className = 'log' + (type ? ' ' + type : '');
    }

    // ========== تحميل Pi SDK مع مهلة ==========
    const sdkTimeout = setTimeout(() => {
      if (!window.Pi) {
        setLog('⚠️ لم يتم تحميل Pi SDK. تأكد من فتح الصفحة في تطبيق Pi Browser', 'error');
        loginBtn.disabled = true;
        statusText.innerText = '❌ خطأ في التحميل';
      }
    }, 8000);

    const waitInterval = setInterval(() => {
      if (window.Pi) {
        Pi.init({ version: '2.0', sandbox: true });
        piReady = true;
        clearInterval(waitInterval);
        clearTimeout(sdkTimeout);
        loginBtn.disabled = false;
        statusText.innerText = '✅ جاهز — اضغط تسجيل الدخول';
        setLog('✅ جاهز للربط — اضغط الزر أدناه');
      }
    }, 200);

    // ========== تسجيل الدخول عبر Pi ==========
    async function login() {
      if (!piReady) {
        return setLog('❌ افتح التطبيق داخل Pi Browser', 'error');
      }

      loginBtn.disabled = true;
      loginSpinner.style.display = 'block';
      loginBtnText.innerText = 'جاري الاتصال...';

      try {
        const auth = await Pi.authenticate(
          ['username', 'payments'],
          (p) => console.log('⚠️ دفعة غير مكتملة:', p)
        );

        currentUser = auth.user;

        // تخزين الجلسة بشكل آمن
        sessionStorage.setItem('pi_session', JSON.stringify({
          username: auth.user.username,
          uid: auth.user.uid,
          timestamp: Date.now()
        }));

        document.getElementById('username').innerText = '@' + auth.user.username;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('paySection').classList.remove('hidden');
        statusBox.classList.add('connected');
        setLog('✅ تم تسجيل الدخول بنجاح', 'success');
      } catch (e) {
        setLog('❌ فشل تسجيل الدخول: ' + e.message, 'error');
        loginBtn.disabled = false;
        loginSpinner.style.display = 'none';
        loginBtnText.innerText = 'تسجيل الدخول عبر Pi';
      }
    }

    // ========== إنشاء الدفعة ==========
    async function pay() {
      const amount = parseFloat(document.getElementById('amount').value);
      const memo = document.getElementById('memo').value || 'دفعة عبر Nexcore';

      if (!amount || amount <= 0) {
        return setLog('❌ أدخل مبلغ صحيح', 'error');
      }

      setLog('⏳ جاري إنشاء الدفعة...');

      try {
        const payment = await Pi.createPayment(
          {
            amount: amount,
            memo: memo,
            metadata: { app: 'nexcore' }
          },
          {
            // ===== 1. موافقة الخادم =====
            onReadyForServerApproval: async (paymentId) => {
              setLog('⏳ جاري موافقة الخادم...');
              try {
                const response = await fetch(API_BASE_URL + '/payments/approve', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (currentUser?.uid || '')
                  },
                  body: JSON.stringify({
                    paymentId: paymentId,
                    amount: amount,
                    userId: currentUser?.uid
                  })
                });
                if (!response.ok) {
                  const errorData = await response.json();
                  throw new Error(errorData.error || 'فشلت موافقة الخادم');
                }
                setLog('✅ تمت موافقة الخادم', 'success');
              } catch (err) {
                setLog('❌ فشل الموافقة: ' + err.message, 'error');
              }
            },

            // ===== 2. توثيق الدفعة =====
            onReadyForServerCompletion: async (paymentId, txid) => {
              setLog('⏳ جاري توثيق الدفعة وتحديث المخزون...');
              try {
                const response = await fetch(API_BASE_URL + '/payments/complete', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (currentUser?.uid || '')
                  },
                  body: JSON.stringify({
                    paymentId: paymentId,
                    txid: txid,
                    userId: currentUser?.uid,
                    amount: amount
                  })
                });
                if (!response.ok) {
                  const errorData = await response.json();
                  throw new Error(errorData.error || 'فشل التوثيق');
                }
                // نجاح
                setLog('✅✅ تمت الدفعة بنجاح! المبلغ: ' + amount + ' π', 'success');
                showSuccessAnimation();
              } catch (err) {
                setLog('❌ فشل الإكمال: ' + err.message, 'error');
              }
            },

            onCancel: () => setLog('❌ تم إلغاء الدفعة من قبل المستخدم'),
            onError: (err) => setLog('❌ خطأ في المعاملة: ' + err.message, 'error')
          }
        );
      } catch (e) {
        setLog('❌ فشل إنشاء الدفعة: ' + e.message, 'error');
      }
    }

    // ========== تأثير النجاح ==========
    function showSuccessAnimation() {
      const card = document.getElementById('appCard');
      card.classList.add('success-flash');
      logEl.innerHTML = '✅✅✅ تمت الدفعة بنجاح ✅✅✅';
      logEl.style.background = 'rgba(0,184,148,0.2)';
      logEl.style.border = '2px solid var(--success)';
      logEl.style.fontSize = '18px';
      logEl.style.padding = '20px';

      setTimeout(() => {
        card.classList.remove('success-flash');
        logEl.style.background = '';
        logEl.style.border = '';
        logEl.style.fontSize = '';
        logEl.style.padding = '';
      }, 5000);
    }

    // ========== تسجيل الخروج ==========
    function logout() {
      currentUser = null;
      sessionStorage.removeItem('pi_session');

      document.getElementById('paySection').classList.add('hidden');
      document.getElementById('loginSection').classList.remove('hidden');
      statusBox.classList.remove('connected');
      loginBtn.disabled = false;
      loginSpinner.style.display = 'none';
      loginBtnText.innerText = 'تسجيل الدخول عبر Pi';
      setLog('✅ تم تسجيل الخروج — اضغط للدخول مرة أخرى');
    }

    // ========== استعادة الجلسة عند التحميل ==========
    document.addEventListener('DOMContentLoaded', () => {
      const savedSession = sessionStorage.getItem('pi_session');
      if (savedSession) {
        try {
          const session = JSON.parse(savedSession);
          // التحقق من صلاحية الجلسة (أقل من ساعة)
          if (Date.now() - session.timestamp < 3600000) {
            console.log('🔄 تم استعادة جلسة سابقة لـ @' + session.username);
          } else {
            sessionStorage.removeItem('pi_session');
          }
        } catch (e) {
          sessionStorage.removeItem('pi_session');
        }
      }
    });
  </script>
</body>
</html>
