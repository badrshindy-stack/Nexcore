<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXCORE
  - بوابة الدفع الآمنة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* اترك التصميم الحالي كما هو
  - أنيق جدا */
        /* يمكن إضافة التحسينات أدناه */

        .secure-badge {
            background: rgba(0,184,148,0.1);
            border: 1px solid rgba(0,184,148,0.2);
            color: var(--success);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="header">
            <div class="logo-placeholder">π</div>
            <h1>بوابة دفع NEXCORE</h1>
            <p>حلول الدفع الرقمية الآمنة لـ Pi Network</p>
        </div>

        <div class="content">
            <!-- قسم تسجيل الدخول -->
            <div id="loginSection">
                <div class="status-box" id="statusBox">
                    <span class="status-dot"></span>
                    <span id="statusText">جاري تحميل Pi SDK...</span>
                </div>
                <button id="loginBtn" class="btn-primary" onclick="login()" disabled>
                    <div class="spinner" id="loginSpinner"></div>
                    <span id="loginBtnText">تسجيل الدخول عبر Pi</span>
                </button>
                <div class="secure-badge">🔒 اتصال مشفر وآمن</div>
            </div>

            <!-- قسم الدفع -->
            <div id="paySection" class="hidden">
                <div class="user-welcome">
                    مرحباً <b id="username"></b> 👋
                </div>

                <div class="input-group">
                    <label>المبلغ (π)</label>
                    <input type="number" id="amount" value="1" step="0.01" min="0.01">
                </div>

                <div class="input-group">
                    <label>الوصف / البيان</label>
                    <input type="text" id="memo" value="دفعة عبر بوابة Nexcore">
                </div>

                <button class="btn-secondary" onclick="pay()">
                    ⚡ إرسال الدفعة
                </button>
                <button onclick="logout()" style="background:rgba(255,255,255,0.08); color:var(--text-muted); font-size:14px; padding:12px; border:1px solid rgba(255,255,255,0.05);">
                    ↩ تسجيل خروج
                </button>

                <!-- ربط بالمخزون -->
                <a href="/dashboard.html" style="display:block; text-align:center; margin-top:15px; color:var(--primary); font-size:14px; text-decoration:none; padding:10px; border:1px solid rgba(108,92,231,0.3); border-radius:12px;">
                    🏪 الذهاب إلى لوحة المخزون
                </a>
            </div>

            <div class="log" id="log">انتظر تحميل البيئة...</div>
        </div>
    </div>

    <script>
        // ========== إعدادات الأمان ==========
        const API_BASE_URL = 'https://your-backend-url.com/api'; // ❗ غيّر هذا لاحقاً
        let piReady = false;
        let currentUser = null;

        const logEl = document.getElementById('log');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginBtnText = document.getElementById('loginBtnText');
        const statusText = document.getElementById('statusText');

        function setLog(msg, type = '') {
            logEl.innerText = msg;
            logEl.className = 'log ' + type;
        }
