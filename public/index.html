<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXCORE App</title>
    <!-- تضمين مكتبة Pi SDK الرسمية -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #58a6ff;
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            color: #8b949e;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            background-color: #ffc107;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #e0a800;
        }
        .status-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            text-align: left;
            font-family: monospace;
            font-size: 14px;
        }
        .error {
            color: #f85149;
            margin-top: 10px;
        }
        .success {
            color: #3fb950;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NEXCORE App</h1>
    <p>مرحباً بك في تطبيق NEXCORE. يرجى الضغط على الزر أدناه لتنفيذ عملية الدفع التجريبية واجتياز الخطوة العاشرة في حساب المطورين.</p>
    
    <button class="btn" onclick="startPayment()">تجربة دفع 1 Pi</button>

    <div class="status-box">
        <div>Status: <span id="status">System Ready...</span></div>
        <div id="log"></div>
    </div>
</div>

<script>
    // 1. تهيئة الـ SDK الخاص بـ Pi Network
    Pi.init({ version: "2.0", sandbox: true }); // اجعل sandbox: false عند الانتقال للشبكة الحقيقية

    // 2. دالة المصادقة مع طلب صلاحية الـ payments بشكل صريح
    async function authUser() {
        try {
            updateLog("جاري تسجيل الدخول والمصادقة...");
            // هنا يكمن التعديل الأساسي بإضافة 'payments' للمصفوفة
            const scopes = ['username', 'payments']; 
            
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            updateLog("تم تسجيل الدخول بنجاح للمستخدم: " + auth.user.username, "success");
            return auth;
        } catch (error) {
            updateLog("فشل المصادقة: " + error.message, "error");
            throw error;
        }
    }

    // 3. دالة بدء عملية الدفع
    async function startPayment() {
        try {
            // المصادقة أولاً بالصلاحيات الصحيحة
            await authUser();

            updateLog("جاري تحضير عملية الدفع...");

            // إنشاء طلب الدفع
            const payment = await Pi.createPayment({
                amount: 1.0,
                memo: "تجربة دفع 1 Pi لتطبيق NEXCORE",
                metadata: { orderId: "test-order-123" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    updateLog("تم تجهيز الدفع. بانتظار موافقة السيرفر المطور ID: " + paymentId);
                    // هنا ترسل الـ paymentId إلى السيرفر الخاص بك لاعتماده
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    updateLog("تمت الموافقة. جاري إكمال الدفع على الشبكة TxID: " + txid);
                    // هنا ترسل الـ txid للسيرفر الخاص بك لإغلاق العملية
                },
                onCancel: function(paymentId) {
                    updateLog("تم إلغاء عملية الدفع من قبل المستخدم.", "error");
                },
                onError: function(error, payment) {
                    updateLog("حدث خطأ أثناء الدفع: " + error.message, "error");
                }
            });

        } catch (error) {
            updateLog("فشل استدعاء نافذة الدفع: " + error.message, "error");
        }
    }

    // دالة للتعامل مع المدفوعات المعلقة (Incomplete Payments)
    function onIncompletePaymentFound(payment) {
        updateLog("تم العثور على عملية دفع معلقة وغير مكتملة ID: " + payment.identifier);
        // أرسل الـ payment.identifier إلى السيرفر لإكمالها أو إلغائها
    }

    // دالة مساعدة لتحديث سجل الحالة على الشاشة
    function updateLog(message, type = "") {
        const logDiv = document.getElementById("log");
        let colorClass = "";
        if (type === "error") colorClass = 'class="error"';
        if (type === "success") colorClass = 'class="success"';
        
        logDiv.innerHTML = `<span ${colorClass}>> ${message}</span>`;
        document.getElementById("status").innerText = "Active";
    }
</script>

</body>
</html>
