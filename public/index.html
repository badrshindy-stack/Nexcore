<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة دفع Nexcore - Pi Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    :root {
      --primary: #6c5ce7;
      --accent: #fdcb6e;
      --bg-dark: #0f0c1b;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-light: #f5f6fa;
      --text-muted: #a0a5c0;
      --success: #00b894;
      --danger: #d63031;
      --input-bg: rgba(0, 0, 0, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

    body {
      background: radial-gradient(circle at top right, #2d124d 0%, var(--bg-dark) 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; color: var(--text-light);
    }

    .payment-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      width: 100%; max-width: 440px;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .header {
      background: linear-gradient(135deg, rgba(108,92,231,0.2) 0%, rgba(253,203,110,0.05) 100%);
      padding: 40px 30px 30px; text-align: center;
      border-bottom: 1px solid var(--card-border); position: relative;
    }
    .header::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60px; height: 4px; background: var(--primary); border-radius: 0 0 10px 10px;
    }
    .logo-placeholder {
      width: 70px; height: 70px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      border-radius: 22px; margin: 0 auto 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: bold; color: #fff;
      box-shadow: 0 10px 25px rgba(108,92,231,0.4);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
    }
    .header h1 { font-size: 24px; font-weight: 800; letter-spacing:0.5px; }
    .header p { color: var(--text-muted); font-size: 13px; margin-top:5px; font-weight:500; }

    .content { padding: 30px; }

    .status-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 18px; border-radius: 20px; margin-bottom: 20px;
      text-align: center; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: var(--accent);
    }
    .status-box.connected {
      background: rgba(0,184,148,0.1);
      border-color: rgba(0,184,148,0.2);
      color: var(--success);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .status-box.connected .status-dot { background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%{transform:scale(0.9);opacity:0.6} 50%{transform:scale(1.1);opacity:1} 100%{transform:scale(0.9);opacity:0.6} }

    button {
      width: 100%; padding: 16px; border: none; border-radius: 18px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      margin-bottom: 12px; transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #4a12cc 100%);
      color: #fff; border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(108,92,231,0.5); }
    .btn-secondary {
      background: linear-gradient(135deg, #f1c40f 0%, #d39e00 100%);
      color: #1e1e1e; border: none;
    }
    .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(241,196,15,0.3); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; background: #444 !important; color: #aaa !important; box-shadow: none !important; }

    .input-group { margin-bottom: 14px; text-align: right; }
    .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .input-group input {
      width: 100%; padding: 14px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--input-bg); color: var(--text-light);
      font-size: 16px; outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,0.2), inset 0 2px 4px rgba(0,0,0,0.2); }

    .user-welcome {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px; border-radius: 16px; margin-bottom: 18px;
      text-align: center; font-size: 15px;
    }
    .user-welcome b { color: var(--accent); }

    .log {
      margin-top: 16px; padding: 14px;
      background: rgba(0,0,0,0.25); border-radius: 16px;
      font-size: 13px; min-height: 20px; text-align: center;
      color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05);
      line-height: 1.5;
    }
    .log.success { color: var(--success); }
    .log.error { color: var(--danger); }

    .spinner {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="payment-card">
    <div class="header">
      <div class="logo-placeholder">π</div>
      <h1>بوابة دفع NEXCORE</h1>
      <p>حلول الدفع الرقمية الآمنة لـ Pi Network</p>
    </div>

    <div class="content">
      <!-- قسم تسجيل الدخول -->
      <div id="loginSection">
        <div class="status-box" id="statusBox">
          <span class="status-dot"></span>
          <span id="statusText">جاري تحميل Pi SDK...</span>
        </div>
        <button id="loginBtn" class="btn-primary" onclick="login()" disabled>
          <div class="spinner" id="loginSpinner"></div>
          <span id="loginBtnText">تسجيل الدخول عبر Pi</span>
        </button>
      </div>

      <!-- قسم الدفع -->
      <div id="paySection" class="hidden">
        <div class="user-welcome">
          مرحباً <b id="username"></b> 👋
        </div>

        <div class="input-group">
          <label>المبلغ (π)</label>
          <input type="number" id="amount" value="1" step="0.01" min="0.01">
        </div>

        <div class="input-group">
          <label>الوصف / البيان</label>
          <input type="text" id="memo" value="دفعة عبر بوابة Nexcore">
        </div>

        <button class="btn-secondary" onclick="pay()">
          ⚡ إرسال الدفعة
        </button>
        <button onclick="logout()" style="background:rgba(255,255,255,0.08); color:var(--text-muted); font-size:14px; padding:12px; border:1px solid rgba(255,255,255,0.05);">
          ↩ تسجيل خروج
        </button>
      </div>

      <div class="log" id="log">انتظر تحميل البيئة...</div>
    </div>
  </div>

<script>
  let piReady = false;
  const logEl = document.getElementById('log');
  const loginBtn = document.getElementById('loginBtn');
  const loginSpinner = document.getElementById('loginSpinner');
  const loginBtnText = document.getElementById('loginBtnText');
  const statusText = document.getElementById('statusText');

  function setLog(msg, type='') {
    logEl.innerText = msg;
    logEl.className = 'log ' + type;
  }

  // === نفس المنطق الشغال عندك ===
  const wait = setInterval(() => {
    if (window.Pi) {
      Pi.init({ version: "2.0", sandbox: true });
      piReady = true;
      clearInterval(wait);
      loginBtn.disabled = false;
      statusText.innerText = "جاهز — اضغط تسجيل الدخول";
      setLog("✅ جاهز للربط — اضغط الزر أدناه");
    }
  }, 200);

  async function login() {
    if (!piReady) return setLog("افتح التطبيق داخل Pi Browser", "error");

    loginBtn.disabled = true;
    loginSpinner.style.display = "block";
    loginBtnText.innerText = "جاري الاتصال...";

    try {
      const auth = await Pi.authenticate(
        ["username", "payments"],
        (p) => console.log("incomplete payment", p)
      );

      document.getElementById('username').innerText = "@" + auth.user.username;
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('paySection').classList.remove('hidden');

      document.getElementById('statusBox').classList.add('connected');
      setLog("تم تسجيل الدخول بنجاح ✅", "success");

    } catch (e) {
      setLog("فشل تسجيل الدخول: " + e.message, "error");
      loginBtn.disabled = false;
    } finally {
      loginSpinner.style.display = "none";
      loginBtnText.innerText = "تسجيل الدخول عبر Pi";
    }
  }

  function pay() {
    const amount = parseFloat(document.getElementById('amount').value);
    const memo = document.getElementById('memo').value;
    if (!amount || amount <= 0) return setLog("أدخل مبلغ صحيح أكبر من صفر", "error");

    setLog("جاري إنشاء الدفعة...");

    Pi.createPayment(
      { amount, memo, metadata: { app: "nexcore", time: Date.now() } },
      {
        onReadyForServerApproval: async (paymentId) => {
          setLog("بانتظار موافقة السيرفر...");
          try {
            const r = await fetch('/api/approve', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId })
            });
            if (!r.ok) throw new Error(await r.text());
            setLog("✅ تمت موافقة السيرفر", "success");
          } catch (err) {
            setLog("فشل الموافقة: " + err.message, "error");
          }
        },
        onReadyForServerCompletion: async (paymentId, txid) => {
          setLog("جاري توثيق الدفعة...");
          try {
            const r = await fetch('/api/complete', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId, txid })
            });
            if (!r.ok) throw new Error(await r.text());
            setLog("✅ تمت الدفعة بنجاح! Tx: " + txid.slice(0,12) + "...", "success");
          } catch (err) {
            setLog("فشل الإكمال: " + err.message, "error");
          }
        },
        onCancel: () => setLog("تم إلغاء الدفعة من قبل المستخدم"),
        onError: (err) => setLog("خطأ في المعاملة: " + err.message, "error")
      }
    );
  }

  function logout() {
    document.getElementById('paySection').classList.add('hidden');
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('statusBox').classList.remove('connected');
    loginBtn.disabled = false;
    setLog("تم تسجيل الخروج — اضغط للدخول مرة أخرى");
  }
</script>
</body>
</html>
