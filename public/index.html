<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexcore - Pi Network App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px; max-width: 400px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      width: 80px; height: 80px; margin: 0 auto 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: bold;
    }
    h1 { text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; opacity: 0.8; margin-bottom: 24px; font-size: 14px; }
    button {
      width: 100%; padding: 14px;
      background: #fff; color: #6a11cb;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      margin-top: 12px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input {
      width: 100%; padding: 12px;
      border: none; border-radius: 12px;
      margin-top: 8px; font-size: 16px;
    }
    label { display: block; margin-top: 12px; font-size: 14px; }
    .log {
      margin-top: 16px; padding: 12px;
      background: rgba(0,0,0,0.2); border-radius: 12px;
      font-size: 13px; min-height: 20px; text-align: center;
    }
    .user-box {
      background: rgba(255,255,255,0.15);
      padding: 12px; border-radius: 12px; margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">π</div>
    <h1>Nexcore</h1>
    <p class="subtitle">تطبيق Pi Network</p>

    <div id="loginSection">
      <button id="loginBtn" onclick="login()">تسجيل الدخول عبر Pi</button>
    </div>

    <div id="paySection" style="display:none">
      <div class="user-box">مرحباً <b id="username"></b> 👋</div>
      <label>المبلغ (π)</label>
      <input type="number" id="amount" value="1" step="0.01">
      <label>الوصف</label>
      <input type="text" id="memo" value="دفعة تجريبية">
      <button onclick="pay()">إرسال الدفعة</button>
    </div>

    <div class="log" id="log">جاري تحميل SDK...</div>
  </div>

<script>
  let piReady = false;
  const log = (msg) => document.getElementById('log').innerText = msg;

  const wait = setInterval(() => {
    if (window.Pi) {
      Pi.init({ version: "2.0", sandbox: true });
      piReady = true;
      log("جاهز — اضغط تسجيل الدخول");
      clearInterval(wait);
    }
  }, 200);

  async function login() {
    if (!piReady) return log("افتح التطبيق داخل Pi Browser");
    try {
      const auth = await Pi.authenticate(
        ["username", "payments"],
        (p) => console.log("incomplete payment", p)
      );
      document.getElementById('username').innerText = "@" + auth.user.username;
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('paySection').style.display = 'block';
      log("تم تسجيل الدخول ✅");
    } catch (e) {
      log("فشل تسجيل الدخول: " + e.message);
    }
  }

  function pay() {
    const amount = parseFloat(document.getElementById('amount').value);
    const memo = document.getElementById('memo').value;
    if (!amount || amount <= 0) return log("أدخل مبلغ صحيح");

    log("جاري إنشاء الدفعة...");
    Pi.createPayment(
      { amount, memo, metadata: { app: "nexcore" } },
      {
        onReadyForServerApproval: async (paymentId) => {
          log("موافقة السيرفر...");
          const r = await fetch('/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId })
          });
          if (!r.ok) log("فشل الموافقة: " + await r.text());
        },
        onReadyForServerCompletion: async (paymentId, txid) => {
          log("إكمال الدفعة...");
          const r = await fetch('/api/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, txid })
          });
          if (r.ok) log("✅ تمت الدفعة! TxID: " + txid.slice(0,12) + "...");
          else log("فشل الإكمال: " + await r.text());
        },
        onCancel: () => log("تم إلغاء الدفعة"),
        onError: (err) => log("خطأ: " + err.message)
      }
    );
  }
</script>
</body>
</html>
