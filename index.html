<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexcore - Pi Network App</title>
    <!-- استدعاء مكتبة Pi SDK الرسمية -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background-color: #673ab7; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #user-info { margin: 20px 0; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <h1>تطبيق Nexcore</h1>
        <div id="user-info">جاري الاتصال بـ Pi Network...</div>
        <button id="auth-btn" onclick="login()">تسجيل الدخول عبر Pi</button>
    </div>

    <script>
        // تهيئة الـ SDK للعمل على شبكة الاختبار (Testnet)
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true }); 

        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('user-info').innerHTML = `
                    <p>مرحباً: <b>${user.user.username}</b></p>
                    <p>تم الاتصال بنجاح على الـ Testnet</p>
                `;
                document.getElementById('auth-btn').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء تسجيل الدخول");
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("يوجد عملية دفع معلقة:", payment);
        }
    </script>
</body>
</html>
